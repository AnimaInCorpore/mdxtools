<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MDXPlay Browser</title>
  <style>
    :root {
      --bg0: #f5efe3;
      --bg1: #e2d0b2;
      --bg2: #c09870;
      --ink: #1c1108;
      --ink-soft: #5a4230;
      --ink-muted: #8a6c50;
      --card: rgba(254, 249, 239, 0.93);
      --card-border: rgba(150, 110, 60, 0.28);
      --line: rgba(100, 70, 30, 0.16);
      --accent: #bf3e00;
      --accent-hover: #d44800;
      --accent-2: #0d5040;
      --stop-bg: #5a1800;
      --stop-hover: #6e2200;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: "Segoe UI", "Bahnschrift", "Trebuchet MS", system-ui, sans-serif;
      font-size: 14px;
      color: var(--ink);
      background:
        radial-gradient(ellipse 120% 60% at -5% -10%, #fce9bb 0%, transparent 55%),
        radial-gradient(ellipse 80% 80% at 108% 0%, #d8b274 0%, transparent 55%),
        linear-gradient(155deg, var(--bg0) 0%, var(--bg1) 50%, var(--bg2) 100%);
      background-attachment: fixed;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 20px;
    }

    .app {
      width: min(920px, 100%);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      background: var(--card);
      backdrop-filter: blur(4px);
      box-shadow:
        0 1px 0 rgba(255,255,255,0.85) inset,
        0 22px 52px rgba(50, 28, 8, 0.22),
        0 2px 6px rgba(50, 28, 8, 0.10);
      overflow: hidden;
      animation: rise 260ms cubic-bezier(.22,.8,.35,1);
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      padding: 11px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 250, 236, 0.65);
    }

    .app-name {
      font-family: "Impact", "Arial Black", sans-serif;
      font-size: 19px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      line-height: 1;
      flex-shrink: 0;
    }

    .app-name em {
      font-style: normal;
      color: var(--accent);
    }

    .vr {
      width: 1px;
      height: 18px;
      background: var(--line);
      flex-shrink: 0;
    }

    .settings {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .field {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--ink-muted);
    }

    input[type="number"] {
      width: 62px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(255, 253, 246, 0.95);
      color: var(--ink);
      padding: 4px 7px;
      font: inherit;
      font-size: 13px;
      text-align: center;
    }

    input[type="number"]:focus {
      outline: 2px solid rgba(191, 62, 0, 0.3);
      outline-offset: 1px;
    }

    .spacer { flex: 1 1 0; }

    .btn-row {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    button {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: rgba(255, 252, 244, 0.95);
      color: var(--ink);
      padding: 5px 12px;
      font: inherit;
      font-size: 13px;
      cursor: pointer;
      line-height: 1.35;
      transition: background 90ms, box-shadow 90ms, transform 70ms;
      white-space: nowrap;
      user-select: none;
    }

    button:hover {
      background: #ffffff;
      box-shadow: 0 3px 8px rgba(0,0,0,0.1);
      transform: translateY(-1px);
    }

    button:active { transform: none; box-shadow: none; }

    .btn-primary {
      background: var(--accent);
      color: #fff7ee;
      border-color: rgba(0,0,0,0.14);
    }
    .btn-primary:hover { background: var(--accent-hover); color: #fff7ee; }

    .btn-stop {
      background: var(--stop-bg);
      color: #ffd8c4;
      border-color: rgba(0,0,0,0.18);
    }
    .btn-stop:hover { background: var(--stop-hover); color: #ffd8c4; }

    /* ── Content ── */
    .body {
      padding: 14px 16px;
      display: grid;
      gap: 10px;
    }

    /* Drop zone */
    .drop-zone {
      border: 1.5px dashed rgba(140, 100, 50, 0.38);
      border-radius: 10px;
      background: rgba(255, 252, 244, 0.45);
      min-height: 66px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      cursor: pointer;
      transition: border-color 130ms, background 130ms;
      padding: 12px 16px;
    }

    .drop-zone:hover,
    .drop-zone.dragging {
      border-color: var(--accent-2);
      background: rgba(13, 80, 64, 0.07);
    }

    .drop-arrow {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border: 1.5px solid rgba(140, 100, 50, 0.32);
      border-radius: 8px;
      font-size: 16px;
      line-height: 1;
      color: var(--ink-muted);
      flex-shrink: 0;
      background: rgba(255, 252, 244, 0.85);
    }

    .drop-text strong {
      display: block;
      font-size: 14px;
      color: var(--ink);
      margin-bottom: 2px;
    }

    .drop-text span {
      font-size: 12px;
      color: var(--ink-muted);
    }

    /* Track list */
    .track-list {
      list-style: none;
      max-height: 310px;
      overflow-y: auto;
      display: grid;
      gap: 4px;
      scrollbar-width: thin;
      scrollbar-color: var(--line) transparent;
      counter-reset: tracks;
    }

    .track-list::-webkit-scrollbar { width: 4px; }
    .track-list::-webkit-scrollbar-track { background: transparent; }
    .track-list::-webkit-scrollbar-thumb {
      background: var(--line);
      border-radius: 2px;
    }

    .track, .empty {
      border: 1px solid rgba(150, 110, 60, 0.15);
      border-radius: 8px;
      background: rgba(255, 253, 247, 0.97);
      padding: 6px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .track {
      counter-increment: tracks;
    }

    .track::before {
      content: counter(tracks);
      font-size: 11px;
      color: var(--ink-muted);
      min-width: 18px;
      text-align: right;
      flex-shrink: 0;
      opacity: 0.6;
    }

    .empty {
      justify-content: center;
      color: var(--ink-muted);
      min-height: 54px;
      font-size: 13px;
      border-style: dashed;
      border-color: rgba(150, 110, 60, 0.2);
      background: transparent;
    }

    .track-name {
      font-size: 13px;
      font-family: "Cascadia Code", "Consolas", "Courier New", monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .track-actions { display: flex; gap: 5px; flex-shrink: 0; }

    .track-actions button {
      padding: 3px 10px;
      font-size: 12px;
      border-radius: 5px;
    }

    /* Status bar */
    .statusbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-top: 1px solid var(--line);
      background: rgba(255, 250, 236, 0.5);
      min-height: 34px;
    }

    .indicator {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--ink-muted);
      flex-shrink: 0;
      opacity: 0.35;
    }

    #now-playing {
      font-size: 13px;
      color: var(--accent-2);
      font-weight: 600;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #status {
      font-size: 12px;
      color: var(--ink-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 280px;
      text-align: right;
    }

    @media (max-width: 560px) {
      .vr { display: none; }
      .settings { gap: 8px; }
      #status { display: none; }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="toolbar">
      <div class="app-name">MDX<em>PLAY</em></div>
      <div class="vr"></div>
      <div class="settings">
        <div class="field">
          <label for="loops">Loops</label>
          <input id="loops" type="number" min="0" max="99" value="2">
        </div>
        <div class="field">
          <label for="max-seconds">Max&nbsp;sec</label>
          <input id="max-seconds" type="number" min="10" max="7200" value="600">
        </div>
      </div>
      <div class="spacer"></div>
      <div class="btn-row">
        <button id="browse-btn" class="btn-primary">&#8593; Browse</button>
        <button id="stop-btn" class="btn-stop">&#9632; Stop</button>
        <button id="clear-btn">&times; Clear</button>
      </div>
    </div>

    <div class="body">
      <section id="drop-zone" class="drop-zone" aria-label="Drop files here">
        <div class="drop-arrow">&#8595;</div>
        <div class="drop-text">
          <strong>Drop MDX + PDX files here</strong>
          <span>Multiple files supported — or click Browse above</span>
        </div>
      </section>

      <ul id="track-list" class="track-list"></ul>
    </div>

    <div class="statusbar">
      <div class="indicator"></div>
      <div id="now-playing">Nothing playing</div>
      <div id="status"></div>
    </div>
  </main>

  <input id="file-picker" type="file" accept=".mdx,.pdx" multiple hidden>
  <script type="module" src="./mdxplay_app.js"></script>
</body>
</html>
